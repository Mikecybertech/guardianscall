const StandaloneStyles = () => (
  <style>{`
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Space+Mono:wght@400;700&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow-x:hidden;scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:#f8f6ff;color:#1e1b4b;-webkit-font-smoothing:antialiased;min-height:100%}
    #root{min-height:100vh}
    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:rgba(79,70,229,.2);border-radius:2px}
    button{cursor:pointer;border:none;outline:none;background:none;font-family:inherit}
    input,textarea,select{font-family:inherit;outline:none}
    a{color:inherit;text-decoration:none}
    :root {
      --cc-cream:#f8f6ff;--cc-white:#ffffff;
      --cc-indigo:#4f46e5;--cc-indigo-dark:#3730a3;--cc-indigo-light:#818cf8;
      --cc-violet:#7c3aed;--cc-violet-light:#a78bfa;
      --cc-rose:#e11d48;--cc-rose-light:#fb7185;
      --cc-sage:#059669;--cc-sage-light:#34d399;
      --cc-amber-cc:#d97706;--cc-sky-cc:#0284c7;
      --cc-text:#1e1b4b;--cc-muted:#6b7280;
      --cc-border:rgba(79,70,229,0.12);
      --cc-font:'DM Sans',sans-serif;--cc-serif:'DM Serif Display',serif;
      --cc-radius:18px;--cc-radius-sm:12px;
      --cc-shadow:0 4px 24px rgba(79,70,229,0.12);
      --cc-shadow-lg:0 12px 48px rgba(79,70,229,0.18);
      --border:rgba(148,163,184,.15);--glass:rgba(255,255,255,.04);--glass-border:rgba(255,255,255,.08);
      --navy:#0a0e1a;--navy-mid:#111827;--navy-light:#1e2a3a;
      --cobalt-bright:#2563eb;--sky:#3b82f6;--teal:#0d9488;--teal-bright:#14b8a6;
      --red:#ef4444;--amber:#f59e0b;--green:#10b981;--muted:#94a3b8;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    @keyframes typingDot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
    @keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(79,70,229,.4)}70%{box-shadow:0 0 0 16px rgba(79,70,229,0)}100%{box-shadow:0 0 0 0 rgba(79,70,229,0)}}
    .fade-up{animation:fadeUp .5s ease both} .fade-in{animation:fadeIn .4s ease both}
    .pulse{animation:pulse 2s ease-in-out infinite} .spin{animation:spin .9s linear infinite}
    .breathe{animation:breathe 4s ease-in-out infinite}
    .cc-nav{position:fixed;top:0;left:0;right:0;z-index:100;transition:all .3s}
    .cc-nav--scrolled{background:rgba(248,246,255,.97);border-bottom:1px solid var(--cc-border);backdrop-filter:blur(16px);box-shadow:0 2px 16px rgba(79,70,229,.08)}
    .cc-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:100px;font-size:15px;font-weight:600;transition:all .2s;border:none;cursor:pointer;font-family:var(--cc-font)}
    .cc-btn--primary{background:var(--cc-indigo);color:white;box-shadow:0 4px 16px rgba(79,70,229,.35)}
    .cc-btn--primary:hover{background:var(--cc-indigo-dark);transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,70,229,.45)}
    .cc-btn--ghost{background:transparent;border:1.5px solid var(--cc-border);color:var(--cc-muted)}
    .cc-btn--ghost:hover{border-color:var(--cc-indigo);color:var(--cc-indigo)}
    .cc-btn--violet{background:var(--cc-violet);color:white}
    .cc-btn--violet:hover{background:#6d28d9;transform:translateY(-2px)}
    .cc-card{background:var(--cc-white);border:1px solid var(--cc-border);border-radius:var(--cc-radius);box-shadow:var(--cc-shadow);transition:all .2s}
    .cc-card:hover{box-shadow:var(--cc-shadow-lg);transform:translateY(-2px)}
    .cc-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:100px;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
    .cc-tag--indigo{background:rgba(79,70,229,.1);border:1px solid rgba(79,70,229,.2);color:var(--cc-indigo)}
    .cc-tag--violet{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);color:var(--cc-violet)}
    .cc-tag--sage{background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.2);color:var(--cc-sage)}
    .cc-tag--rose{background:rgba(225,29,72,.1);border:1px solid rgba(225,29,72,.2);color:var(--cc-rose)}
    .cc-input{width:100%;background:#f5f3ff;border:1.5px solid var(--cc-border);border-radius:var(--cc-radius-sm);padding:13px 16px;color:var(--cc-text);font-size:15px;font-family:var(--cc-font);transition:border-color .2s}
    .cc-input:focus{border-color:var(--cc-indigo);background:white}
    .cc-input::placeholder{color:var(--cc-muted);opacity:.7}
    .cc-section{padding:90px 32px}
    .cc-hero{min-height:100vh;display:flex;align-items:center;background:linear-gradient(160deg,#f0edff 0%,#f8f6ff 40%,#fff5f8 100%);padding-top:80px;position:relative;overflow:hidden}
    .cc-hero::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(79,70,229,.08) 0%,transparent 70%);border-radius:50%;pointer-events:none}
    .cc-hero::after{content:'';position:absolute;bottom:-100px;left:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(124,58,237,.06) 0%,transparent 70%);border-radius:50%;pointer-events:none}
    .cc-chat-bubble-ai{background:white;border:1px solid var(--cc-border);border-radius:18px 18px 18px 4px;padding:14px 18px;max-width:85%;font-size:15px;line-height:1.65;animation:fadeUp .4s ease both;box-shadow:0 2px 12px rgba(79,70,229,.08)}
    .cc-chat-bubble-user{background:var(--cc-indigo);color:white;border-radius:18px 18px 4px 18px;padding:13px 18px;max-width:85%;font-size:15px;line-height:1.65;animation:fadeUp .4s ease both;margin-left:auto}
    .haven-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--cc-indigo),var(--cc-violet));display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 12px rgba(79,70,229,.3)}
    .role-card{background:white;border:1px solid var(--cc-border);border-radius:var(--cc-radius);padding:28px;cursor:pointer;transition:all .25s}
    .role-card:hover{border-color:var(--cc-indigo);box-shadow:var(--cc-shadow-lg);transform:translateY(-4px)}
    .memory-dot{position:relative;padding-left:32px}
    .memory-dot::before{content:'';position:absolute;left:0;top:8px;width:12px;height:12px;border-radius:50%;background:var(--cc-indigo);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
    .memory-dot::after{content:'';position:absolute;left:5px;top:20px;width:2px;height:calc(100% + 16px);background:rgba(79,70,229,.15)}
    .memory-dot:last-child::after{display:none}
    .cc-tab{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:10px 4px;background:none;color:var(--cc-muted);font-size:10px;font-weight:600;transition:all .2s;border:none;cursor:pointer;font-family:var(--cc-font)}
    .cc-tab.active{color:var(--cc-indigo)}
    .haven-msg{max-width:84%;animation:fadeUp .3s ease}
    .haven-msg-ai{background:white;border:1px solid var(--cc-border);border-radius:18px 18px 18px 4px;padding:13px 16px;font-size:15px;line-height:1.65;box-shadow:0 2px 8px rgba(79,70,229,.08)}
    .haven-msg-user{background:var(--cc-indigo);color:white;border-radius:18px 18px 4px 18px;padding:12px 16px;font-size:15px;line-height:1.6;margin-left:auto}
    .quick-reply{padding:8px 16px;border-radius:100px;border:1.5px solid var(--cc-border);background:white;color:var(--cc-indigo);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--cc-font)}
    .quick-reply:hover{background:var(--cc-indigo);color:white;border-color:var(--cc-indigo)}
    .sym-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;font-size:13px;font-weight:500;border:1px solid;cursor:pointer;transition:all .2s}
    .typing-dot{width:7px;height:7px;border-radius:50%;background:var(--cc-muted);display:inline-block;animation:typingDot 1.2s ease-in-out infinite}
    .typing-dot:nth-child(2){animation-delay:.2s} .typing-dot:nth-child(3){animation-delay:.4s}
    .mic-pulse{animation:pulseRing 2s ease-in-out infinite}
    .teams-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;justify-content:center;align-items:center;z-index:10000;backdrop-filter:blur(4px)}
    .agent-card{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .2s;text-align:left;width:100%}
    .agent-card.active{border-color:var(--cobalt-bright);background:rgba(37,99,235,.1)}

// ── In-memory ticket store (replace with real API/Supabase in production) ──
const TICKET_STORE = [];

function logTicket(data) {
  const ticket = {
    id: Date.now(),
    ...data,
    timestamp: new Date().toISOString(),
  };
  TICKET_STORE.unshift(ticket);
  if (TICKET_STORE.length > 50) TICKET_STORE.pop();
  // Persist to sessionStorage so it survives re-renders
  try {
    sessionStorage.setItem("gc_tickets", JSON.stringify(TICKET_STORE));
  } catch {}
  return ticket;
}

function loadTickets() {
  try {
    const stored = sessionStorage.getItem("gc_tickets");
    if (stored) {
      const parsed = JSON.parse(stored);
      TICKET_STORE.splice(0, TICKET_STORE.length, ...parsed);
    }
  } catch {}
  return TICKET_STORE;
}

  const [errors, setErrors] = useState({});

  useEffect(() => {
    if (isOpen) {
      setTimeout(() => firstInputRef.current?.focus(), 50);
    }
  }, [isOpen]);

  // Keyboard trap for ADA compliance
  useEffect(() => {
    if (!isOpen) return;
    const handleKey = (e) => {
      if (e.key === "Escape") onClose();
      if (e.key === "Tab" && modalRef.current) {
        const focusable = modalRef.current.querySelectorAll('button, input, select, textarea, [tabindex]:not([tabindex="-1"])');
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey ? document.activeElement === first : document.activeElement === last) {
          e.preventDefault();
          (e.shiftKey ? last : first).focus();
        }
      }
    };
    document.addEventListener("keydown", handleKey);
    return () => document.removeEventListener("keydown", handleKey);
  }, [isOpen, onClose]);

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = "Name is required";
    if (!form.email.trim() || !form.email.includes("@")) e.email = "Valid email required";
    if (!form.issue.trim()) e.issue = "Please describe your issue";
    setErrors(e);
    return Object.keys(e).length === 0;

  // ─── SentinelHaven Claude API ─────────────────────────────────────────────
async function callCompanionAI(messages, systemPrompt, onChunk) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      stream: true,
      messages,
    }),
  });
  if (!response.ok) throw new Error(`API error: ${response.status}`);
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let full = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const lines = decoder.decode(value).split("\n").filter(l => l.startsWith("data: "));
    for (const line of lines) {
      try {
        const data = JSON.parse(line.slice(6));
        if (data.type === "content_block_delta" && data.delta?.text) {
          full += data.delta.text;
          onChunk(full);
        }
      } catch {}
    }
  }
  return full;
}

// ─── H.A.V.E.N COMPANION APP ──────────────────────────────────────────────────
const CCCompanionApp = ({ onNavigate }) => {
  const [profile, setProfile] = useState(() => ccStore.get("profile", DEFAULT_PROFILE));
  const [messages, setMessages] = useState(() => ccStore.get("messages", [
    { role: "assistant", content: `Hello ${ccStore.get("profile", DEFAULT_PROFILE).name || "there"} 😊 I'm H.A.V.E.N — your personal companion. I'm here to talk, listen, and help you with whatever you need today. How are you feeling right now?`, ts: new Date().toISOString() }
  ]));
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [activeTab, setActiveTab] = useState("chat");
  const [moodLog, setMoodLog] = useState(() => ccStore.get("moodlog", []));
  const [reminders, setReminders] = useState(() => ccStore.get("reminders", REMINDER_TEMPLATES));
  const [activities, setActivities] = useState(() => ccStore.get("activities", ACTIVITY_SUGGESTIONS.map(a => ({...a, done: false}))));
  const [showVoice, setShowVoice] = useState(false);
  const [showMoodModal, setShowMoodModal] = useState(false);
  const [newMood, setNewMood] = useState({ score: 7, note: "", energy: 6, lonely: false });
  const [memoryInput, setMemoryInput] = useState({ year: "", event: "", category: "Life" });
  const [showAddMemory, setShowAddMemory] = useState(false);
  const messagesEnd = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { messagesEnd.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);
  useEffect(() => { ccStore.set("messages", messages.slice(-40)); }, [messages]);
  useEffect(() => { ccStore.set("moodlog", moodLog); }, [moodLog]);

  const sendMessage = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role: "user", content: input, ts: new Date().toISOString() };
    const history = [...messages, userMsg];
    setMessages(history);
    setInput("");
    setLoading(true);
    const apiMsgs = history.slice(-12).map(m => ({ role: m.role === "assistant" ? "assistant" : "user", content: m.content }));
    setMessages(h => [...h, { role: "assistant", content: "", ts: new Date().toISOString(), streaming: true }]);
    try {
      await callCompanionAI(apiMsgs, COMPANION_SYSTEM(profile), chunk => {
        setMessages(h => h.map((m, i) => i === h.length - 1 ? { ...m, content: chunk } : m));
      });
      setMessages(h => h.map((m, i) => i === h.length - 1 ? { ...m, streaming: false } : m));
    } catch {
      setMessages(h => h.map((m, i) => i === h.length - 1 ? { ...m, content: "I'm having a little trouble right now. If you need help urgently, please call a family member or 988.", streaming: false } : m));
    }
    setLoading(false);
  };

  const logMood = () => {
    const entry = { ...newMood, id: Date.now(), date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }) };
    setMoodLog(l => [entry, ...l].slice(0, 90));
    setShowMoodModal(false);
    setNewMood({ score: 7, note: "", energy: 6, lonely: false });
  };

  const addMemory = () => {
    if (!memoryInput.year || !memoryInput.event) return;
    const updated = { ...profile, memories: [...(profile.memories || []), { id: Date.now(), ...memoryInput }].sort((a, b) => a.year - b.year) };
    setProfile(updated);
    ccStore.set("profile", updated);
    setMemoryInput({ year: "", event: "", category: "Life" });
    setShowAddMemory(false);
  };

        .mood-circle { width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;border:3px solid; }

          <div>
            <div style={{ color: "white", fontWeight: 700, fontSize: 15 }}>H.A.V.E.N</div>
            <div style={{ color: "rgba(255,255,255,.7)", fontSize: 11, display: "flex", alignItems: "center", gap: 5 }}>

          </div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>

          <button onClick={() => onNavigate("cc-landing")} style={{ background: "rgba(255,255,255,.15)", border: "none", color: "rgba(255,255,255,.8)", borderRadius: 10, padding: "7px 10px", cursor: "pointer" }}>
            <CCIcon name="home" size={15} color="white" />

        </div>
      </div>

      {/* Content */}
      <div style={{ flex: 1, overflow: "auto" }}>

        {/* CHAT */}
        {activeTab === "chat" && (
          <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
            <div style={{ flex: 1, overflow: "auto", padding: "16px 14px 8px", display: "flex", flexDirection: "column", gap: 14 }}>

                    {m.content || (m.streaming ? <span style={{ display: "flex", gap: 5, padding: "2px 0" }}><div className="typing-dot" /><div className="typing-dot" /><div className="typing-dot" /></span> : "")}

            </div>
            {/* Quick replies */}
            <div style={{ padding: "6px 14px", overflowX: "auto", display: "flex", gap: 8, whiteSpace: "nowrap" }}>

                </div>
                <div style={{ background: lonelyDays > 2 ? "rgba(225,29,72,.3)" : "rgba(255,255,255,.15)", borderRadius: 12, padding: "10px 14px", flex: 1, textAlign: "center" }}>

                  <div style={{ fontSize: 11, opacity: .8, marginTop: 2 }}>Lonely days</div>

                </div>

            <div style={{ background: "white", borderRadius: 16, border: "1px solid var(--cc-border)", padding: 18 }}>

        {activeTab === "memories" && (

                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={addMemory} className="cc-btn cc-btn--primary" style={{ flex: 1, justifyContent: "center" }}>Save</button>

          </div>

        {activeTab === "wellness" && (
          <div style={{ padding: 16, animation: "fadeUp .4s ease" }}>
            <div style={{ fontSize: 18, fontWeight: 700, fontFamily: "var(--cc-serif)", color: "var(--cc-text)", marginBottom: 4 }}>Wellness Log</div>
            <div style={{ fontSize: 13, color: "var(--cc-muted)", marginBottom: 16 }}>Track how you're feeling over time.</div>
            {lonelyDays > 2 && (
              <div style={{ background: "rgba(225,29,72,.06)", border: "1px solid rgba(225,29,72,.2)", borderRadius: 14, padding: "14px 16px", marginBottom: 16, display: "flex", gap: 12 }}>
                <CCIcon name="alert" size={18} color="var(--cc-rose)" />
                <div style={{ fontSize: 14, color: "#be123c", lineHeight: 1.5 }}>
                  You've felt lonely {lonelyDays} of the last 7 days. Would you like H.A.V.E.N to help you reach out to someone?
                </div>
              </div>
            )}
            <button onClick={() => setShowMoodModal(true)} style={{ width: "100%", background: "var(--cc-indigo)", color: "white", border: "none", borderRadius: 12, padding: "13px", fontSize: 15, fontWeight: 600, cursor: "pointer", marginBottom: 16 }}>+ Log Today's Mood</button>

              <div style={{ textAlign: "center", padding: "40px 0", color: "var(--cc-muted)" }}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>📊</div>

            ) : moodLog.slice(0, 10).map(e => (
              <div key={e.id} style={{ background: "white", border: "1px solid var(--cc-border)", borderRadius: 14, padding: "14px 16px", marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <div style={{ fontSize: 13, color: "var(--cc-muted)" }}>{e.date} · {e.time}</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    {e.lonely && <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 100, background: "rgba(225,29,72,.1)", color: "var(--cc-rose)", border: "1px solid rgba(225,29,72,.2)" }}>Lonely</span>}

                </div>
                <div style={{ display: "flex", gap: 16 }}>
                  {[["Mood", e.score, "var(--cc-indigo)"],["Energy", e.energy, "var(--cc-sage)"]].map(([l,v,c]) => (
                    <div key={l} style={{ flex: 1 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>

                      <div style={{ height: 5, borderRadius: 3, background: "#f0edff", overflow: "hidden" }}>

                </div>
                {e.note && <div style={{ fontSize: 13, color: "var(--cc-muted)", marginTop: 8, fontStyle: "italic" }}>{e.note}</div>}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Mood Modal */}
      {showMoodModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(30,27,75,.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20 }} onClick={e => e.target === e.currentTarget && setShowMoodModal(false)}>
          <div style={{ background: "white", borderRadius: 22, padding: 26, width: "100%", maxWidth: 380, animation: "fadeUp .3s ease" }}>
            <div style={{ fontFamily: "var(--cc-serif)", fontSize: 22, color: "var(--cc-text)", marginBottom: 22 }}>How are you feeling?</div>
            {[["Mood", "score", "var(--cc-indigo)"],["Energy", "energy", "var(--cc-sage)"]].map(([l,k,c]) => (
              <div key={k} style={{ marginBottom: 20 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 14, marginBottom: 10 }}>
                  <span style={{ color: "var(--cc-muted)", fontWeight: 600 }}>{l}</span>
                  <span style={{ color: c, fontWeight: 700 }}>{newMood[k]}/10 {moodEmoji(newMood[k])}</span>
                </div>
                <input type="range" min={1} max={10} value={newMood[k]} onChange={e => setNewMood(m => ({...m, [k]: +e.target.value}))} style={{ width: "100%", accentColor: c }} />
              </div>
            ))}
            <label style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, cursor: "pointer" }}>
              <input type="checkbox" checked={newMood.lonely} onChange={e => setNewMood(m => ({...m, lonely: e.target.checked}))} style={{ width: 18, height: 18, accentColor: "var(--cc-rose)" }} />
              <span style={{ fontSize: 14, color: "var(--cc-text)" }}>I've been feeling lonely today</span>
            </label>
            <input value={newMood.note} onChange={e => setNewMood(m => ({...m, note: e.target.value}))} placeholder="Anything else on your mind? (optional)" className="cc-input" style={{ marginBottom: 18 }} />
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={logMood} className="cc-btn cc-btn--primary" style={{ flex: 1, justifyContent: "center" }}>Save</button>
              <button onClick={() => setShowMoodModal(false)} style={{ flex: 1, background: "#f5f3ff", border: "1px solid var(--cc-border)", borderRadius: 100, padding: "11px", color: "var(--cc-muted)", fontSize: 14, cursor: "pointer" }}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Bottom tabs */}
      <div style={{ borderTop: "1px solid var(--cc-border)", display: "flex", background: "white", paddingBottom: "env(safe-area-inset-bottom)" }}>
        {tabs.map(t => (
          <button key={t.id} className={`cc-tab ${activeTab === t.id ? "active" : ""}`} onClick={() => setActiveTab(t.id)}>
            <CCIcon name={t.icon} size={20} color={activeTab === t.id ? "var(--cc-indigo)" : "var(--cc-muted)"} />
            {t.label}
          </button>
        ))}
      </div>
    </div>
  );
};

// ─── FAMILY PORTAL ────────────────────────────────────────────────────────
const CCFamilyPortal = ({ onNavigate }) => {
  const [activeTab, setActiveTab] = useState("overview");
  const moodLog = ccStore.get("moodlog", []);
  const messages = ccStore.get("messages", []);
  const [summary, setSummary] = useState("");
  const [loadingSummary, setLoadingSummary] = useState(false);
  const profile = ccStore.get("profile", DEFAULT_PROFILE);

  const generateSummary = async () => {
    setLoadingSummary(true);
    const recentMoods = moodLog.slice(0, 7);
    const avgMood = recentMoods.length ? (recentMoods.reduce((s, m) => s + m.score, 0) / recentMoods.length).toFixed(1) : "no data";
    const lonelyDays = recentMoods.filter(m => m.lonely).length;
    const prompt = `Weekly summary for ${profile.name}: Average mood ${avgMood}/10. Lonely days: ${lonelyDays}/7. Recent conversations: ${messages.slice(-6).map(m => m.content?.slice(0, 60)).join(" | ")}`;
    setSummary("");
    try {
      await callCompanionAI([{ role: "user", content: prompt }], WELLNESS_SYSTEM, chunk => setSummary(chunk));
    } catch { setSummary("Unable to generate summary right now. Please check connection."); }
    setLoadingSummary(false);
  };

  const avgMood = moodLog.slice(0, 7).length ? (moodLog.slice(0, 7).reduce((s, m) => s + m.score, 0) / Math.min(moodLog.length, 7)).toFixed(1) : "—";
  const lonelyDays = moodLog.slice(0, 7).filter(m => m.lonely).length;
  const chatDays = new Set(messages.map(m => new Date(m.ts).toDateString())).size;

  return (
    <div style={{ minHeight: "100vh", background: "var(--cc-cream)", color: "var(--cc-text)" }}>
      <div style={{ background: "white", borderBottom: "1px solid var(--cc-border)", padding: "16px 28px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 50 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={() => onNavigate("cc-landing")} style={{ color: "var(--cc-muted)", fontSize: 13, display: "flex", alignItems: "center", gap: 5 }}>← Back</button>
          <div style={{ fontFamily: "var(--cc-serif)", fontSize: 20, color: "var(--cc-text)", fontWeight: 600 }}>Family Portal</div>
        </div>
        <div className="cc-tag cc-tag--sage">{profile.name}'s Dashboard</div>
      </div>

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "28px 24px" }}>
        {/* Stats */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 16, marginBottom: 28 }}>
          {[
            { label:"Avg Mood (7d)", value:`${avgMood}/10`, icon:"😊", color:"var(--cc-indigo)", alert: false },
            { label:"Lonely Days (7d)", value:`${lonelyDays}/7`, icon:"🤝", color:"var(--cc-rose)", alert: lonelyDays > 2 },
            { label:"Days Active", value:chatDays, icon:"💬", color:"var(--cc-sage)", alert: false },
            { label:"Mood Logs", value:moodLog.length, icon:"📊", color:"var(--cc-violet)", alert: false },
          ].map(s => (
            <div key={s.label} className="cc-card" style={{ padding: "18px 16px", cursor: "default", border: s.alert ? "1px solid rgba(225,29,72,.3)" : "1px solid var(--cc-border)", background: s.alert ? "rgba(225,29,72,.04)" : "white" }}>
              <div style={{ fontSize: 26, marginBottom: 6 }}>{s.icon}</div>
              <div style={{ fontFamily: "var(--cc-serif)", fontSize: 28, color: s.color, lineHeight: 1 }}>{s.value}</div>
              <div style={{ fontSize: 12, color: "var(--cc-muted)", marginTop: 4 }}>{s.label}</div>
              {s.alert && <div style={{ fontSize: 11, color: "var(--cc-rose)", marginTop: 4, fontWeight: 600 }}>⚠ Consider reaching out</div>}
            </div>
          ))}
        </div>

        {/* AI Summary */}
        <div className="cc-card" style={{ padding: 24, marginBottom: 24, background: "white" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <div style={{ fontFamily: "var(--cc-serif)", fontSize: 20, color: "var(--cc-text)" }}>AI Wellness Summary</div>
            <button onClick={generateSummary} disabled={loadingSummary} className="cc-btn cc-btn--primary" style={{ padding: "9px 20px", fontSize: 13 }}>
              {loadingSummary ? "Generating…" : "Generate Summary"}
            </button>
          </div>
          {!summary && !loadingSummary && (
            <p style={{ color: "var(--cc-muted)", fontSize: 15, fontStyle: "italic" }}>
              Click "Generate Summary" to get an AI-written wellbeing report for {profile.name}.
            </p>
          )}
          {loadingSummary && !summary && (
            <div style={{ display: "flex", alignItems: "center", gap: 10, color: "var(--cc-muted)" }}>
              <div style={{ width: 18, height: 18, border: "2px solid var(--cc-indigo)", borderTopColor: "transparent", borderRadius: "50%", animation: "spin .8s linear infinite" }} />
              H.A.V.E.N is analyzing recent activity…
            </div>
          )}
          {summary && (
            <div style={{ fontSize: 15, lineHeight: 1.75, color: "var(--cc-text)", background: "#f5f3ff", borderRadius: 12, padding: "16px 18px", border: "1px solid rgba(79,70,229,.1)" }}>
              {summary}
            </div>
          )}
        </div>

        {/* Recent Mood Log */}
        <div className="cc-card" style={{ padding: 24, background: "white" }}>
          <div style={{ fontFamily: "var(--cc-serif)", fontSize: 20, color: "var(--cc-text)", marginBottom: 16 }}>Recent Mood Log</div>
          {moodLog.length === 0 ? (
            <p style={{ color: "var(--cc-muted)", textAlign: "center", padding: "32px 0" }}>No mood logs yet. Encourage {profile.name} to check in with H.A.V.E.N daily.</p>
          ) : moodLog.slice(0, 7).map(e => (
            <div key={e.id} style={{ display: "flex", gap: 16, alignItems: "center", padding: "10px 0", borderBottom: "1px solid var(--cc-border)" }}>
              <div style={{ fontSize: 24 }}>{e.score >= 8 ? "😊" : e.score >= 6 ? "🙂" : e.score >= 4 ? "😐" : "😔"}</div>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", gap: 12 }}>
                  <span style={{ fontSize: 13, color: "var(--cc-indigo)", fontWeight: 600 }}>Mood {e.score}/10</span>
                  <span style={{ fontSize: 13, color: "var(--cc-sage)", fontWeight: 600 }}>Energy {e.energy}/10</span>
                  {e.lonely && <span style={{ fontSize: 11, padding: "1px 8px", borderRadius: 100, background: "rgba(225,29,72,.1)", color: "var(--cc-rose)" }}>Lonely</span>}
                </div>
                {e.note && <div style={{ fontSize: 13, color: "var(--cc-muted)", marginTop: 2 }}>{e.note}</div>}
              </div>
              <div style={{ fontSize: 12, color: "var(--cc-muted)" }}>{e.date}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ─── CAREGIVER PORTAL ─────────────────────────────────────────────────────
const CCCaregiverPortal = ({ onNavigate }) => {
  const profile = ccStore.get("profile", DEFAULT_PROFILE);
  const moodLog = ccStore.get("moodlog", []);
  const [notes, setNotes] = useState(() => ccStore.get("care_notes", []));
  const [newNote, setNewNote] = useState("");
  const [reminders, setReminders] = useState(() => ccStore.get("reminders", REMINDER_TEMPLATES));
  const [showAddReminder, setShowAddReminder] = useState(false);
  const [newReminder, setNewReminder] = useState({ title: "", time: "09:00", repeat: "daily", icon: "🔔", category: "other" });

  const addNote = () => {
    if (!newNote.trim()) return;
    const updated = [{ id: Date.now(), text: newNote, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }) }, ...notes];
    setNotes(updated);
    ccStore.set("care_notes", updated);
    setNewNote("");
  };

  const addReminder = () => {
    const updated = [...reminders, { ...newReminder, id: Date.now() }];
    setReminders(updated);
    ccStore.set("reminders", updated);
    setShowAddReminder(false);
    setNewReminder({ title: "", time: "09:00", repeat: "daily", icon: "🔔", category: "other" });
  };

  const removeReminder = id => { const updated = reminders.filter(r => r.id !== id); setReminders(updated); ccStore.set("reminders", updated); };

  const lonelyDays = moodLog.slice(0, 7).filter(m => m.lonely).length;
  const avgMood = moodLog.slice(0, 7).length ? (moodLog.slice(0, 7).reduce((s, m) => s + m.score, 0) / Math.min(moodLog.length, 7)).toFixed(1) : "—";

  return (
    <div style={{ minHeight: "100vh", background: "var(--cc-cream)", color: "var(--cc-text)" }}>
      <div style={{ background: "white", borderBottom: "1px solid var(--cc-border)", padding: "16px 28px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 50 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={() => onNavigate("cc-landing")} style={{ color: "var(--cc-muted)", fontSize: 13 }}>← Back</button>
          <div style={{ fontFamily: "var(--cc-serif)", fontSize: 20, color: "var(--cc-text)", fontWeight: 600 }}>Caregiver Portal</div>
        </div>
        <div className="cc-tag cc-tag--violet">Care Plan Active</div>
      </div>

      <div style={{ maxWidth: 960, margin: "0 auto", padding: "28px 24px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>

        {/* Alerts */}
        {lonelyDays > 2 && (
          <div style={{ gridColumn: "1/-1", background: "rgba(225,29,72,.06)", border: "1px solid rgba(225,29,72,.25)", borderRadius: 14, padding: "16px 20px", display: "flex", gap: 14, alignItems: "start" }}>
            <CCIcon name="alert" size={20} color="var(--cc-rose)" />
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#be123c", marginBottom: 4 }}>Loneliness Alert</div>
              <div style={{ fontSize: 14, color: "#9f1239", lineHeight: 1.5 }}>
                {profile.name} has reported feeling lonely {lonelyDays} of the last 7 days. Consider scheduling a visit or family call. Average mood: {avgMood}/10.
              </div>
            </div>
          </div>
        )}

        {/* Reminders management */}
        <div className="cc-card" style={{ padding: 22, background: "white" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <div style={{ fontFamily: "var(--cc-serif)", fontSize: 18, color: "var(--cc-text)" }}>Reminders</div>
            <button onClick={() => setShowAddReminder(true)} style={{ background: "var(--cc-indigo)", color: "white", borderRadius: 8, padding: "6px 12px", fontSize: 12, fontWeight: 600, border: "none", cursor: "pointer" }}>+ Add</button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {reminders.map(r => (
              <div key={r.id || r.title} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: "#f9f8ff", borderRadius: 10, border: "1px solid var(--cc-border)" }}>
                <span style={{ fontSize: 20 }}>{r.icon}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: "var(--cc-text)" }}>{r.title}</div>
                  <div style={{ fontSize: 12, color: "var(--cc-muted)" }}>{r.time} · {r.repeat}</div>
                </div>
                <button onClick={() => removeReminder(r.id || r.title)} style={{ background: "none", color: "var(--cc-muted)", cursor: "pointer", padding: 4 }}>
                  <CCIcon name="trash" size={14} color="var(--cc-muted)" />
                </button>
              </div>
            ))}
          </div>
          {showAddReminder && (
            <div style={{ marginTop: 16, padding: 16, background: "#f5f3ff", borderRadius: 12, border: "1px solid rgba(79,70,229,.15)" }}>
              {[["Title","title","e.g. Morning Stretch"],["Time","time",""],["Repeat","repeat","daily / weekly"]].map(([l,k,p]) => (
                <div key={k} style={{ marginBottom: 10 }}>
                  <label style={{ fontSize: 12, color: "var(--cc-muted)", fontWeight: 600, display: "block", marginBottom: 4 }}>{l}</label>
                  <input value={newReminder[k]} onChange={e => setNewReminder(r => ({...r, [k]: e.target.value}))} placeholder={p} type={k==="time"?"time":"text"} className="cc-input" style={{ padding: "9px 12px", fontSize: 13 }} />
                </div>
              ))}
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={addReminder} className="cc-btn cc-btn--primary" style={{ flex: 1, justifyContent: "center", padding: "9px" }}>Add</button>
                <button onClick={() => setShowAddReminder(false)} style={{ flex: 1, background: "white", border: "1px solid var(--cc-border)", borderRadius: 100, color: "var(--cc-muted)", fontSize: 13, cursor: "pointer" }}>Cancel</button>
              </div>
            </div>
          )}
        </div>

        {/* Handoff Notes */}
        <div className="cc-card" style={{ padding: 22, background: "white" }}>
          <div style={{ fontFamily: "var(--cc-serif)", fontSize: 18, color: "var(--cc-text)", marginBottom: 14 }}>Care Notes</div>
          <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
            <textarea value={newNote} onChange={e => setNewNote(e.target.value)} placeholder="Add a handoff note, observation, or care update…" rows={3} className="cc-input" style={{ flex: 1, resize: "none", lineHeight: 1.5 }} />
          </div>
          <button onClick={addNote} className="cc-btn cc-btn--primary" style={{ width: "100%", justifyContent: "center", padding: "10px", marginBottom: 14 }}>Save Note</button>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 260, overflow: "auto" }}>
            {notes.length === 0 ? (
              <div style={{ textAlign: "center", padding: "28px 0", color: "var(--cc-muted)", fontSize: 14 }}>No notes yet.</div>
            ) : notes.map(n => (
              <div key={n.id} style={{ background: "#f9f8ff", border: "1px solid var(--cc-border)", borderRadius: 10, padding: "12px 14px" }}>
                <div style={{ fontSize: 13, color: "var(--cc-text)", lineHeight: 1.6 }}>{n.text}</div>
                <div style={{ fontSize: 11, color: "var(--cc-muted)", marginTop: 5 }}>{n.date} · {n.time}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Progress */}
        <div className="cc-card" style={{ padding: 22, background: "white", gridColumn: "1/-1" }}>
          <div style={{ fontFamily: "var(--cc-serif)", fontSize: 18, color: "var(--cc-text)", marginBottom: 16 }}>Progress Overview</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12 }}>
            {[
              { label:"Total Mood Logs",  value:moodLog.length,      color:"var(--cc-indigo)" },
              { label:"Avg Mood Score",   value:`${avgMood}/10`,     color:"var(--cc-violet)" },
              { label:"Low Mood Days",    value:moodLog.filter(m=>m.score<5).length, color:"var(--cc-rose)" },
              { label:"High Mood Days",   value:moodLog.filter(m=>m.score>=8).length, color:"var(--cc-sage)" },
            ].map(s => (
              <div key={s.label} style={{ background: "#f9f8ff", border: "1px solid var(--cc-border)", borderRadius: 12, padding: "14px 12px", textAlign: "center" }}>
                <div style={{ fontFamily: "var(--cc-serif)", fontSize: 32, color: s.color, lineHeight: 1 }}>{s.value}</div>
                <div style={{ fontSize: 12, color: "var(--cc-muted)", marginTop: 5 }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

  
// ── Standalone SentinelHaven App ──
function SentinelHavenApp() {
  const getInitView = () => {
    const hash   = window.location.hash.replace('#','');
    const params = new URLSearchParams(window.location.search);
    return params.get('view') || hash || 'cc-landing';
  };
  const [view, setView] = useState(getInitView());

  useEffect(() => {
    window.history.replaceState(null, '', '#' + view);
  }, [view]);

  const navigate = (v) => {
    if (v === 'gc-landing' || v === 'guardianscall') {
      window.open('https://guardianscall.com', '_blank', 'noopener');
      return;
    }
    setView(v);
  };

  return (
    <>
      <StandaloneStyles />
      <LiveSupport />
      {view === 'cc-landing'   && <CCLanding        onNavigate={navigate} />}
      {view === 'cc-companion' && <CCCompanionApp    onNavigate={navigate} />}
      {view === 'cc-family'    && <CCFamilyPortal    onNavigate={navigate} />}
      {view === 'cc-caregiver' && <CCCaregiverPortal onNavigate={navigate} />}
    </>
  );
}

const _shRoot = ReactDOM.createRoot(document.getElementById('root'));
_shRoot.render(React.createElement(SentinelHavenApp));

      }, 700);
    });
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault(); window._shInstall = e;
    });
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    }
  </script>
