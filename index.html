// ─── CLAUDE API ────────────────────────────────────────────────────────────────
async function callClaude(messages, systemPrompt, onChunk) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      stream: true,
      messages,
    }),
  });
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let full = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const chunk = decoder.decode(value);
    const lines = chunk.split("\n").filter(l => l.startsWith("data: "));
    for (const line of lines) {
      try {
        const data = JSON.parse(line.slice(6));
        if (data.type === "content_block_delta" && data.delta?.text) {
          full += data.delta.text;
          onChunk(full);
        }
      } catch {}
    }
  }
  return full;
}

const OnboardingFlow = ({ onComplete }) => {
  const [step, setStep] = useState(0);
  const [profile, setProfile] = useState({ name: "", conditions: [], triggers: [], commsPrefs: [], emergencyName: "", emergencyPhone: "" });

  const toggleArr = (key, val) => setProfile(p => ({ ...p, [key]: p[key].includes(val) ? p[key].filter(x => x !== val) : [...p[key], val] }));

  const steps = [
    {
      title: "Welcome to GuardiansCall", sub: "Let's build your personalized travel companion — it takes about 2 minutes.",
      content: (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <label style={{ display: "flex", flexDirection: "column", gap: 8, fontSize: 14, color: "var(--muted)" }}>
            Your first name
            <input value={profile.name} onChange={e => setProfile(p => ({ ...p, name: e.target.value }))} placeholder="What should ARIA call you?" style={{ background: "var(--navy-light)", border: "1px solid var(--border)", borderRadius: 10, padding: "14px 16px", color: "var(--white)", fontSize: 16 }} />
          </label>
        </div>
      ),
      valid: profile.name.trim().length > 0,
    },
    {
      title: "Your conditions", sub: "This helps ARIA anticipate your needs. Everything stays private and encrypted.",
      content: (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
          {CONDITIONS.map(c => (
            <button key={c} onClick={() => toggleArr("conditions", c)} style={{ padding: "10px 16px", borderRadius: 100, fontSize: 14, border: "1px solid", transition: "all 0.2s", borderColor: profile.conditions.includes(c) ? "var(--sky)" : "var(--border)", background: profile.conditions.includes(c) ? "rgba(59,130,246,0.15)" : "transparent", color: profile.conditions.includes(c) ? "var(--sky)" : "var(--muted)" }}>
              {c}
            </button>
          ))}
        </div>
      ),
      valid: true,
    },
    {
      title: "Your triggers", sub: "What environmental factors tend to be most challenging for you?",
      content: (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
          {TRIGGERS.map(t => (
            <button key={t} onClick={() => toggleArr("triggers", t)} style={{ padding: "10px 16px", borderRadius: 100, fontSize: 14, border: "1px solid", transition: "all 0.2s", borderColor: profile.triggers.includes(t) ? "var(--amber)" : "var(--border)", background: profile.triggers.includes(t) ? "rgba(245,158,11,0.15)" : "transparent", color: profile.triggers.includes(t) ? "var(--amber)" : "var(--muted)" }}>
              {t}
            </button>
          ))}
        </div>
      ),
      valid: true,
    },
    {
      title: "Communication preferences", sub: "How should staff and ARIA communicate with you?",
      content: (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
          {COMMS_PREFS.map(p => (
            <button key={p} onClick={() => toggleArr("commsPrefs", p)} style={{ padding: "10px 16px", borderRadius: 100, fontSize: 14, border: "1px solid", transition: "all 0.2s", borderColor: profile.commsPrefs.includes(p) ? "var(--teal-bright)" : "var(--border)", background: profile.commsPrefs.includes(p) ? "rgba(20,184,166,0.15)" : "transparent", color: profile.commsPrefs.includes(p) ? "var(--teal-bright)" : "var(--muted)" }}>
              {p}
            </button>
          ))}
        </div>
      ),
      valid: true,
    },
    {
      title: "Emergency contact", sub: "Who should be notified if ARIA detects a potential medical concern?",
      content: (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <label style={{ display: "flex", flexDirection: "column", gap: 8, fontSize: 14, color: "var(--muted)" }}>
            Contact name
            <input value={profile.emergencyName} onChange={e => setProfile(p => ({ ...p, emergencyName: e.target.value }))} placeholder="Full name" style={{ background: "var(--navy-light)", border: "1px solid var(--border)", borderRadius: 10, padding: "14px 16px", color: "var(--white)", fontSize: 16 }} />
          </label>
          <label style={{ display: "flex", flexDirection: "column", gap: 8, fontSize: 14, color: "var(--muted)" }}>
            Phone number
            <input value={profile.emergencyPhone} onChange={e => setProfile(p => ({ ...p, emergencyPhone: e.target.value }))} placeholder="+1 (555) 000-0000" style={{ background: "var(--navy-light)", border: "1px solid var(--border)", borderRadius: 10, padding: "14px 16px", color: "var(--white)", fontSize: 16 }} />
          </label>
        </div>
      ),
      valid: true,
    },
  ];

  const current = steps[step];

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24, background: "var(--navy)" }}>
      <div style={{ width: "100%", maxWidth: 520 }}>
        {/* Progress */}
        <div style={{ display: "flex", gap: 6, marginBottom: 40 }}>
          {steps.map((_, i) => (
            <div key={i} style={{ flex: 1, height: 3, borderRadius: 2, background: i <= step ? "var(--cobalt-bright)" : "var(--border)", transition: "background 0.3s" }} />
          ))}
        </div>

        <div style={{ animation: "fadeUp 0.4s ease" }}>
          <h2 style={{ fontFamily: "var(--font-display)", fontSize: 30, marginBottom: 10, letterSpacing: "-0.02em" }}>{current.title}</h2>
          <p style={{ color: "var(--muted)", marginBottom: 32, fontSize: 15, lineHeight: 1.6 }}>{current.sub}</p>
          {current.content}
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 40 }}>
          {step > 0 ? (
            <button onClick={() => setStep(s => s - 1)} style={{ background: "transparent", color: "var(--muted)", fontSize: 15, padding: "12px 0" }}>← Back</button>
          ) : <div />}
          <button
            onClick={() => step < steps.length - 1 ? setStep(s => s + 1) : onComplete(profile)}
            disabled={!current.valid}
            style={{ background: current.valid ? "var(--cobalt-bright)" : "var(--navy-light)", color: current.valid ? "white" : "var(--muted)", padding: "14px 32px", borderRadius: 12, fontSize: 16, fontWeight: 600, transition: "all 0.2s" }}
          >
            {step < steps.length - 1 ? "Continue →" : "Launch ARIA →"}
          </button>
        </div>
      </div>
    </div>
  );
};

// ─── PASSENGER APP ────────────────────────────────────────────────────────────
const PassengerApp = ({ profile, onNavigate }) => {
  const [activeTab, setActiveTab] = useState("home");
  const [messages, setMessages] = useState([
    { role: "assistant", content: `Hi ${profile?.name || "there"} 👋 I'm ARIA — your travel companion for today. I have your profile ready and I'm watching for any changes to your flight. What can I help you with right now?`, ts: new Date() }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [alerts, setAlerts] = useState(DEMO_ALERTS);
  const [sosPending, setSosPending] = useState(false);
  const [showBreathing, setShowBreathing] = useState(false);
  const [breathPhase, setBreathPhase] = useState("inhale");
  const [breathCount, setBreathCount] = useState(0);
  const [toast, setToast] = useState(null);
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const showToast = (msg, type = "info") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  };

  useEffect(() => {
    if (!showBreathing) return;
    const phases = [{ p: "inhale", d: 4000 }, { p: "hold", d: 2000 }, { p: "exhale", d: 6000 }, { p: "rest", d: 1000 }];
    let i = 0;
    const run = () => {
      setBreathPhase(phases[i].p);
      if (i === 0) setBreathCount(c => c + 1);
      i = (i + 1) % phases.length;
    };
    run();
    const t = setInterval(run, 3000);
    return () => clearInterval(t);
  }, [showBreathing]);

  const sendMessage = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role: "user", content: input, ts: new Date() };
    const newMsgs = [...messages, userMsg];
    setMessages(newMsgs);
    setInput("");
    setLoading(true);

    const systemCtx = `${SYSTEM_PROMPT_COMPANION}\n\nPASSENGER PROFILE:\nName: ${profile?.name || "Passenger"}\nConditions: ${(profile?.conditions || []).join(", ") || "Not specified"}\nKnown Triggers: ${(profile?.triggers || []).join(", ") || "Not specified"}\nCommunication Preferences: ${(profile?.commsPrefs || []).join(", ") || "Standard"}\n\nCURRENT FLIGHT: ${JSON.stringify(DEMO_FLIGHT)}\nACTIVE ALERTS: ${JSON.stringify(alerts.filter(a => !a.resolved))}`;

    setMessages(m => [...m, { role: "assistant", content: "", ts: new Date(), streaming: true }]);
    try {
      await callClaude(newMsgs.map(m => ({ role: m.role, content: m.content })), systemCtx, (chunk) => {
        setMessages(m => m.map((msg, i) => i === m.length - 1 ? { ...msg, content: chunk } : msg));
      });
      setMessages(m => m.map((msg, i) => i === m.length - 1 ? { ...msg, streaming: false } : msg));
    } catch {
      setMessages(m => m.map((msg, i) => i === m.length - 1 ? { ...msg, content: "I'm having trouble connecting right now. If you need immediate help, please use the SOS button.", streaming: false } : msg));
    }
    setLoading(false);
  };

  const resolveAlert = id => setAlerts(a => a.map(x => x.id === id ? { ...x, resolved: true } : x));

  const triggerSOS = () => {
    setSosPending(true);
    showToast("🚨 Emergency alert sent. ECO Dispatch notified.", "red");
    setTimeout(() => setSosPending(false), 5000);
  };

  const tabs = [
    { id: "home", icon: "grid", label: "Home" },
    { id: "chat", icon: "brain", label: "ARIA" },
    { id: "flight", icon: "plane", label: "Flight" },
    { id: "alerts", icon: "bell", label: "Alerts" },
    { id: "profile", icon: "user", label: "Profile" },
  ];

  const unread = alerts.filter(a => !a.resolved).length;

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", background: "var(--navy)", maxWidth: 480, margin: "0 auto", position: "relative", overflow: "hidden" }}>
      <style>{`
        .tab-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; padding: 10px 8px; background: none; color: var(--muted); font-size: 11px; font-weight: 500; transition: all 0.2s; }
        .tab-btn.active { color: var(--sky); }
        .tab-btn.active svg { color: var(--sky); }
        .msg-bubble { max-width: 85%; padding: 14px 18px; border-radius: 18px; font-size: 15px; line-height: 1.6; animation: fadeUp 0.3s ease; }
        .msg-user { background: var(--cobalt); color: white; border-bottom-right-radius: 4px; margin-left: auto; }
        .msg-aria { background: var(--navy-light); color: var(--white); border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); }
        .quick-action { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 12px; border-radius: 14px; background: var(--glass); border: 1px solid var(--glass-border); cursor: pointer; transition: all 0.2s; flex: 1; min-width: 80px; }
        .quick-action:hover { border-color: var(--sky); background: rgba(59,130,246,0.08); }
      `}</style>

      {/* Toast */}
      {toast && (
        <div className="toast glass-card" style={{ padding: "14px 20px", border: `1px solid ${toast.type === "red" ? "rgba(239,68,68,0.4)" : "var(--border)"}`, color: toast.type === "red" ? "var(--red)" : "var(--white)", fontSize: 14, fontWeight: 500 }}>
          {toast.msg}
        </div>
      )}

      {/* Header */}

        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <img src={LOGO_ICON} alt="Guardians Call" style={{ width: 52, height: 47, objectFit: "contain" }} />
          <div>
            <div style={{ fontSize: 14, fontWeight: 600 }}>GuardiansCall</div>
            <div style={{ fontSize: 11, color: "var(--teal-bright)", display: "flex", alignItems: "center", gap: 4 }}>
              <div style={{ width: 5, height: 5, borderRadius: "50%", background: "var(--teal-bright)", animation: "pulse 2s infinite" }} />
              ARIA Active
            </div>
          </div>
        </div>
        <button onClick={triggerSOS} style={{ background: sosPending ? "var(--red)" : "rgba(239,68,68,0.15)", border: "1px solid rgba(239,68,68,0.4)", color: "var(--red)", padding: "8px 16px", borderRadius: 8, fontSize: 13, fontWeight: 700, transition: "all 0.2s", display: "flex", alignItems: "center", gap: 6 }}>

          <div style={{ display: "flex", flexDirection: "column", gap: 16, animation: "fadeUp 0.4s ease" }}>
            {/* Greeting */}
            <div className="glass-card" style={{ padding: "20px", background: "linear-gradient(135deg, rgba(37,99,235,0.12), rgba(13,148,136,0.08))", border: "1px solid rgba(59,130,246,0.2)" }}>
              <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 4 }}>Good afternoon, {profile?.name || "Traveler"} ✈️</div>
              <div style={{ color: "var(--muted)", fontSize: 14 }}>Your flight departs in ~1 hour 15 minutes</div>
            </div>

            {/* Flight card */}
            <div className="glass-card" style={{ padding: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 16 }}>

                  <div style={{ fontFamily: "var(--font-mono)", fontSize: 13, color: "var(--muted)", marginBottom: 4 }}>{DEMO_FLIGHT.flight}</div>

// ─── STAFF PORTAL LOGIN ───────────────────────────────────────────────────────
const StaffLogin = ({ onLogin, onBack }) => {
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const login = async () => {
    if (!email || !pass) { setError("Please enter credentials."); return; }
    setLoading(true);
    await new Promise(r => setTimeout(r, 1200));
    if (email.includes("@") && pass.length >= 4) {
      const role = email.includes("admin") ? "admin" : email.includes("tsa") ? "tsa" : "gate_agent";
      onLogin({ email, role, name: email.split("@")[0] });
    } else {
      setError("Invalid credentials. Try demo@guardianscall.com / demo");
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--navy)", padding: 24 }}>
      <div style={{ width: "100%", maxWidth: 420 }}>
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <img src={LOGO_MEDIUM} alt="Guardians Call" style={{ width: 100, height: 91, objectFit: "contain", margin: "0 auto 16px", display: "block" }} />
          <h1 style={{ fontFamily: "var(--font-display)", fontSize: 32, marginBottom: 8 }}>Staff Portal</h1>
          <p style={{ color: "var(--muted)", fontSize: 15 }}>GuardiansCall · Airport Operations</p>
        </div>

        <div className="glass-card" style={{ padding: 32 }}>
          {error && <div style={{ background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 10, padding: "12px 16px", fontSize: 14, color: "var(--red)", marginBottom: 20 }}>{error}</div>}

          <div style={{ display: "flex", flexDirection: "column", gap: 16, marginBottom: 24 }}>
            <label style={{ display: "flex", flexDirection: "column", gap: 8, fontSize: 14, color: "var(--muted)" }}>
              Email address
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="agent@airline.com" style={{ background: "var(--navy-light)", border: "1px solid var(--border)", borderRadius: 10, padding: "14px 16px", color: "var(--white)", fontSize: 16 }} />
            </label>
            <label style={{ display: "flex", flexDirection: "column", gap: 8, fontSize: 14, color: "var(--muted)" }}>
              Password
              <input type="password" value={pass} onChange={e => setPass(e.target.value)} onKeyDown={e => e.key === "Enter" && login()} placeholder="••••••••" style={{ background: "var(--navy-light)", border: "1px solid var(--border)", borderRadius: 10, padding: "14px 16px", color: "var(--white)", fontSize: 16 }} />
            </label>
          </div>

          <button onClick={login} disabled={loading} style={{ width: "100%", background: "var(--cobalt-bright)", color: "white", padding: 15, borderRadius: 12, fontSize: 16, fontWeight: 600, transition: "all 0.2s", display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
            {loading ? <div style={{ width: 18, height: 18, border: "2px solid white", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} /> : <><Icon name="lock" size={16} /> Sign in to Staff Portal</>}
          </button>

          <div style={{ marginTop: 20, padding: "14px 16px", background: "rgba(59,130,246,0.06)", borderRadius: 10, border: "1px solid rgba(59,130,246,0.15)", fontSize: 13, color: "var(--muted)" }}>
            <strong style={{ color: "var(--sky)" }}>Demo:</strong> Use any email containing @ and any 4+ char password.<br />
            Use "admin@" for administrator view.
          </div>
        </div>

        <button onClick={onBack} style={{ display: "block", margin: "20px auto 0", background: "none", color: "var(--muted)", fontSize: 14 }}>← Back to main site</button>
      </div>
    </div>
  );
};

                    <div>
                      <div style={{ fontFamily: "var(--font-display)", fontSize: 20 }}>AI Empathy Briefing</div>
                      <div style={{ fontSize: 13, color: "var(--muted)" }}>{selectedPassenger.name}</div>
                    </div>
                    <button onClick={() => setSelectedPassenger(null)} style={{ background: "none", color: "var(--muted)" }}><Icon name="x" size={18} /></button>
                  </div>

                  <div style={{ background: "rgba(59,130,246,0.06)", border: "1px solid rgba(59,130,246,0.15)", borderRadius: 12, padding: 20, minHeight: 200, position: "relative", overflow: "hidden" }}>
                    {loadingBriefing && !briefing && (
                      <div style={{ display: "flex", alignItems: "center", gap: 12, color: "var(--muted)" }}>
                        <div style={{ width: 18, height: 18, border: "2px solid var(--sky)", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
                        ARIA is generating your briefing...
                      </div>
                    )}
                    {briefing && <p style={{ fontSize: 15, lineHeight: 1.75, color: "var(--white)" }}>{briefing}</p>}
                  </div>

                  <div style={{ marginTop: 16 }}>
                    <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em" }}>Communication approach for this passenger:</div>
                    {selectedPassenger.comms.map(c => (
                      <div key={c} style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
                        <Icon name="check" size={14} style={{ color: "var(--teal-bright)", flexShrink: 0 }} />
                        <span style={{ fontSize: 14 }}>{c}</span>
                      </div>
                    ))}
                  </div>

                  <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
                    <button onClick={() => generateBriefing(selectedPassenger)} style={{ flex: 1, background: "var(--cobalt-bright)", color: "white", padding: "12px", borderRadius: 10, fontSize: 14, fontWeight: 600, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                      <Icon name="brain" size={16} />
                      Regenerate
                    </button>
                    <button style={{ flex: 1, background: "rgba(239,68,68,0.12)", color: "var(--red)", border: "1px solid rgba(239,68,68,0.3)", padding: "12px", borderRadius: 10, fontSize: 14, fontWeight: 600 }}>
                      Alert ECO →
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ANALYTICS */}
        {activeTab === "analytics" && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <h2 style={{ fontFamily: "var(--font-display)", fontSize: 28, marginBottom: 24 }}>Operations Analytics</h2>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 28 }}>
              {[
                { label: "Active Passengers", value: "3", delta: "+1 today", color: "var(--sky)" },
                { label: "Incidents Prevented", value: "12", delta: "This month", color: "var(--green)" },
                { label: "Avg Response Time", value: "2.4m", delta: "-0.8m vs last wk", color: "var(--teal-bright)" },
                { label: "Staff Briefings", value: "47", delta: "Generated today", color: "var(--amber)" },
              ].map(s => (
                <div key={s.label} className="glass-card" style={{ padding: 22 }}>
                  <div style={{ fontSize: 13, color: "var(--muted)", marginBottom: 10 }}>{s.label}</div>
                  <div style={{ fontFamily: "var(--font-display)", fontSize: 40, color: s.color, lineHeight: 1 }}>{s.value}</div>
                  <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 6 }}>{s.delta}</div>
                </div>
              ))}
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
              <div className="glass-card" style={{ padding: 24 }}>
                <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 16 }}>Condition Distribution — Active Passengers</div>
                {[["TBI/Cognitive", 38, "var(--sky)"], ["PTSD", 28, "var(--amber)"], ["Anxiety/Autism", 20, "var(--teal-bright)"], ["Dementia", 14, "var(--red)"]].map(([l, p, c]) => (
                  <div key={l} style={{ marginBottom: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 }}>
                      <span style={{ color: "var(--muted)" }}>{l}</span>
                      <span style={{ color: c }}>{p}%</span>
                    </div>
                    <div style={{ height: 6, borderRadius: 3, background: "var(--border)", overflow: "hidden" }}>
                      <div style={{ width: `${p}%`, height: "100%", background: c, borderRadius: 3, transition: "width 1s ease" }} />
                    </div>
                  </div>
                ))}
              </div>

              <div className="glass-card" style={{ padding: 24 }}>
                <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 16 }}>Alert Volume — Last 24h</div>
                <div style={{ display: "flex", gap: 6, alignItems: "flex-end", height: 140 }}>
                  {[3, 5, 4, 7, 2, 6, 8, 4, 3, 5, 9, 6].map((h, i) => (
                    <div key={i} style={{ flex: 1, borderRadius: "3px 3px 0 0", background: `rgba(59,130,246,${0.2 + (h / 9) * 0.6})`, height: `${(h / 9) * 100}%`, transition: "height 0.5s", minWidth: 0 }} />
                  ))}
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "var(--muted)", marginTop: 8 }}>
                  <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>Now</span>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* BRIEFINGS */}
        {activeTab === "briefings" && (
          <div style={{ animation: "fadeUp 0.4s ease", maxWidth: 700 }}>
            <h2 style={{ fontFamily: "var(--font-display)", fontSize: 28, marginBottom: 8 }}>AI Empathy Briefing System</h2>
            <p style={{ color: "var(--muted)", marginBottom: 28, lineHeight: 1.7, fontSize: 15 }}>
              The GuardiansCall AI doesn't produce clinical flags like "PAX FLAG: COGNITIVE IMPAIRMENT." It generates human-centered prompts that help staff respond the way they would to their own family — transforming a transaction into a connection.
            </p>

            <div className="glass-card" style={{ padding: 24, border: "1px solid rgba(245,158,11,0.2)", marginBottom: 20 }}>
              <div style={{ display: "flex", gap: 16 }}>
                <div style={{ width: 44, height: 44, borderRadius: 12, background: "rgba(239,68,68,0.12)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: "var(--red)" }}>
                  <Icon name="x" size={20} />
                </div>
                <div>
                  <div style={{ fontSize: 13, color: "var(--red)", fontWeight: 600, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.05em" }}>Old Approach — Clinical & Dehumanizing</div>
                  <div style={{ fontFamily: "var(--font-mono)", fontSize: 13, background: "rgba(239,68,68,0.06)", padding: "12px 16px", borderRadius: 8, color: "var(--red-soft)" }}>
                    ⚠️ PAX FLAG: COGNITIVE IMPAIRMENT · Gate B22 · Proceed with standard ADA protocol
                  </div>
                </div>
              </div>
            </div>

            <div className="glass-card" style={{ padding: 24, border: "1px solid rgba(16,185,129,0.2)" }}>
              <div style={{ display: "flex", gap: 16 }}>
                <div style={{ width: 44, height: 44, borderRadius: 12, background: "rgba(16,185,129,0.12)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: "var(--green)" }}>
                  <Icon name="heart" size={20} />
                </div>
                <div>
                  <div style={{ fontSize: 13, color: "var(--green)", fontWeight: 600, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.05em" }}>GuardiansCall Approach — Human-Centered</div>
                  <div style={{ fontSize: 15, background: "rgba(16,185,129,0.06)", padding: "16px 18px", borderRadius: 8, lineHeight: 1.75, border: "1px solid rgba(16,185,129,0.15)" }}>
                    "Eleanor is currently overwhelmed by the gate change and needs you to speak slowly and clearly — one instruction at a time. She knows where she's going, she just needs a quiet moment and a calm presence. Think of how you'd want someone to treat your grandmother."
                  </div>
                </div>
              </div>
            </div>

            <div style={{ marginTop: 28, padding: 24 }} className="glass-card">
              <div style={{ fontFamily: "var(--font-display)", fontSize: 18, marginBottom: 16 }}>FAST Neurological Detection</div>
              <p style={{ color: "var(--muted)", fontSize: 14, lineHeight: 1.7, marginBottom: 16 }}>
                The acoustic analysis layer monitors speech patterns through the passenger's app mic. When phoneme-level timing anomalies cross a critical threshold — indicating potential dysarthria consistent with a stroke or TBI episode — the system bypasses airline channels entirely and fires an encrypted webhook directly to ECO dispatch.
              </p>
              {[["Face drooping detected", "Facial symmetry deviation in camera"], ["Arm weakness signal", "Accelerometer asymmetry from device"], ["Speech anomaly", "Phoneme timing analysis → dysarthria flag"], ["Time-critical dispatch", "Supabase Edge Function → ECO API in < 2 seconds"]].map(([l, d]) => (
                <div key={l} style={{ display: "flex", gap: 14, alignItems: "start", marginBottom: 12 }}>
                  <div style={{ width: 28, height: 28, borderRadius: 8, background: "rgba(239,68,68,0.1)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: "var(--red)" }}>
                    <Icon name="sos" size={14} />
                  </div>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 600 }}>{l}</div>
                    <div style={{ fontSize: 13, color: "var(--muted)" }}>{d}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ── In-memory ticket store (replace with real API/Supabase in production) ──
const TICKET_STORE = [];

function logTicket(data) {
  const ticket = {
    id: Date.now(),
    ...data,
    timestamp: new Date().toISOString(),
  };
  TICKET_STORE.unshift(ticket);
  if (TICKET_STORE.length > 50) TICKET_STORE.pop();
  // Persist to sessionStorage so it survives re-renders
  try {
    sessionStorage.setItem("gc_tickets", JSON.stringify(TICKET_STORE));
  } catch {}
  return ticket;
}

function loadTickets() {
  try {
    const stored = sessionStorage.getItem("gc_tickets");
    if (stored) {
      const parsed = JSON.parse(stored);
      TICKET_STORE.splice(0, TICKET_STORE.length, ...parsed);
    }
  } catch {}
  return TICKET_STORE;
}

  useEffect(() => {
    if (isOpen) {
      setTimeout(() => firstInputRef.current?.focus(), 50);
    }
  }, [isOpen]);

  // Keyboard trap for ADA compliance
  useEffect(() => {
    if (!isOpen) return;
    const handleKey = (e) => {
      if (e.key === "Escape") onClose();
      if (e.key === "Tab" && modalRef.current) {
        const focusable = modalRef.current.querySelectorAll('button, input, select, textarea, [tabindex]:not([tabindex="-1"])');
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey ? document.activeElement === first : document.activeElement === last) {
          e.preventDefault();
          (e.shiftKey ? last : first).focus();
        }
      }
    };
    document.addEventListener("keydown", handleKey);
    return () => document.removeEventListener("keydown", handleKey);
  }, [isOpen, onClose]);

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = "Name is required";
    if (!form.email.trim() || !form.email.includes("@")) e.email = "Valid email required";
    if (!form.issue.trim()) e.issue = "Please describe your issue";
    setErrors(e);
    return Object.keys(e).length === 0;
  };

    setForm(f => ({ ...f, [e.target.name]: e.target.value }));
    if (errors[e.target.name]) setErrors(er => ({ ...er, [e.target.name]: null }));

// ─── SentinelHaven Claude API ─────────────────────────────────────────────
async function callCompanionAI(messages, systemPrompt, onChunk) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      stream: true,
      messages,
    }),
  });
  if (!response.ok) throw new Error(`API error: ${response.status}`);
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let full = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const lines = decoder.decode(value).split("\n").filter(l => l.startsWith("data: "));
    for (const line of lines) {
      try {
        const data = JSON.parse(line.slice(6));
        if (data.type === "content_block_delta" && data.delta?.text) {
          full += data.delta.text;
          onChunk(full);
        }
      } catch {}
    }
  }
  return full;
}

// ─── H.A.V.E.N COMPANION APP ──────────────────────────────────────────────────
const CCCompanionApp = ({ onNavigate }) => {
  const [profile, setProfile] = useState(() => ccStore.get("profile", DEFAULT_PROFILE));
  const [messages, setMessages] = useState(() => ccStore.get("messages", [
    { role: "assistant", content: `Hello ${ccStore.get("profile", DEFAULT_PROFILE).name || "there"} 😊 I'm H.A.V.E.N — your personal companion. I'm here to talk, listen, and help you with whatever you need today. How are you feeling right now?`, ts: new Date().toISOString() }
  ]));
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [activeTab, setActiveTab] = useState("chat");
  const [moodLog, setMoodLog] = useState(() => ccStore.get("moodlog", []));
  const [reminders, setReminders] = useState(() => ccStore.get("reminders", REMINDER_TEMPLATES));
  const [activities, setActivities] = useState(() => ccStore.get("activities", ACTIVITY_SUGGESTIONS.map(a => ({...a, done: false}))));
  const [showVoice, setShowVoice] = useState(false);
  const [showMoodModal, setShowMoodModal] = useState(false);
  const [newMood, setNewMood] = useState({ score: 7, note: "", energy: 6, lonely: false });
  const [memoryInput, setMemoryInput] = useState({ year: "", event: "", category: "Life" });
  const [showAddMemory, setShowAddMemory] = useState(false);
  const messagesEnd = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { messagesEnd.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);
  useEffect(() => { ccStore.set("messages", messages.slice(-40)); }, [messages]);
  useEffect(() => { ccStore.set("moodlog", moodLog); }, [moodLog]);

  const sendMessage = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role: "user", content: input, ts: new Date().toISOString() };
    const history = [...messages, userMsg];
    setMessages(history);
    setInput("");
    setLoading(true);
    const apiMsgs = history.slice(-12).map(m => ({ role: m.role === "assistant" ? "assistant" : "user", content: m.content }));
    setMessages(h => [...h, { role: "assistant", content: "", ts: new Date().toISOString(), streaming: true }]);
    try {
      await callCompanionAI(apiMsgs, COMPANION_SYSTEM(profile), chunk => {
        setMessages(h => h.map((m, i) => i === h.length - 1 ? { ...m, content: chunk } : m));
      });
      setMessages(h => h.map((m, i) => i === h.length - 1 ? { ...m, streaming: false } : m));
    } catch {
      setMessages(h => h.map((m, i) => i === h.length - 1 ? { ...m, content: "I'm having a little trouble right now. If you need help urgently, please call a family member or 988.", streaming: false } : m));
    }
    setLoading(false);
  };

  const logMood = () => {
    const entry = { ...newMood, id: Date.now(), date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }) };
    setMoodLog(l => [entry, ...l].slice(0, 90));
    setShowMoodModal(false);
    setNewMood({ score: 7, note: "", energy: 6, lonely: false });
  };

  const addMemory = () => {
    if (!memoryInput.year || !memoryInput.event) return;
    const updated = { ...profile, memories: [...(profile.memories || []), { id: Date.now(), ...memoryInput }].sort((a, b) => a.year - b.year) };
    setProfile(updated);
    ccStore.set("profile", updated);
    setMemoryInput({ year: "", event: "", category: "Life" });
    setShowAddMemory(false);
  };

  const toggleActivity = id => setActivities(a => a.map(x => x.id === id ? { ...x, done: !x.done } : x));
  const avgMood = moodLog.length ? (moodLog.slice(0, 7).reduce((s, m) => s + m.score, 0) / Math.min(moodLog.length, 7)).toFixed(1) : "—";
  const lonelyDays = moodLog.slice(0, 7).filter(m => m.lonely).length;

  const tabs = [
    { id: "chat",       icon: "heart",    label: "H.A.V.E.N" },
    { id: "dashboard",  icon: "home",     label: "Today" },
    { id: "memories",   icon: "book",     label: "Memories" },
    { id: "wellness",   icon: "activity", label: "Wellness" },
  ];

  const moodEmoji = (s) => s >= 8 ? "😊" : s >= 6 ? "🙂" : s >= 4 ? "😐" : "😔";

  return (

        .cc-tab { display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:10px 4px;background:none;color:var(--cc-muted);font-size:10px;font-weight:600;transition:all .2s;border:none;cursor:pointer;font-family:var(--cc-font); }
        .cc-tab.active { color:var(--cc-indigo); }
        .haven-msg { max-width:84%;animation:fadeUp .3s ease; }
        .haven-msg-ai { background:white;border:1px solid var(--cc-border);border-radius:18px 18px 18px 4px;padding:13px 16px;font-size:15px;line-height:1.65;box-shadow:0 2px 8px rgba(79,70,229,.08); }
        .haven-msg-user { background:var(--cc-indigo);color:white;border-radius:18px 18px 4px 18px;padding:12px 16px;font-size:15px;line-height:1.6;margin-left:auto; }
        .quick-reply { padding:8px 16px;border-radius:100px;border:1.5px solid var(--cc-border);background:white;color:var(--cc-indigo);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap; }
        .quick-reply:hover { background:var(--cc-indigo);color:white;border-color:var(--cc-indigo); }
        .mood-circle { width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;border:3px solid; }
      `}</style>

      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, var(--cc-indigo), var(--cc-violet))", padding: "14px 18px 12px", display: "flex", alignItems: "center", justifyContent: "space-between", paddingTop: "calc(14px + env(safe-area-inset-top))" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div className="haven-avatar"><CCIcon name="heart" size={18} color="white" /></div>
          <div>
            <div style={{ color: "white", fontWeight: 700, fontSize: 15 }}>H.A.V.E.N</div>
            <div style={{ color: "rgba(255,255,255,.7)", fontSize: 11, display: "flex", alignItems: "center", gap: 5 }}>
              <div style={{ width: 5, height: 5, borderRadius: "50%", background: "#4ade80", animation: "pulse 2s infinite" }} /> Here for you
            </div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => setShowMoodModal(true)} style={{ background: "rgba(255,255,255,.2)", border: "none", color: "white", borderRadius: 10, padding: "7px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>+ Mood</button>
          <button onClick={() => onNavigate("cc-landing")} style={{ background: "rgba(255,255,255,.15)", border: "none", color: "rgba(255,255,255,.8)", borderRadius: 10, padding: "7px 10px", cursor: "pointer" }}>
            <CCIcon name="home" size={15} color="white" />
          </button>
        </div>
      </div>

      {/* Content */}
      <div style={{ flex: 1, overflow: "auto" }}>

        {/* CHAT */}
        {activeTab === "chat" && (
          <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
            <div style={{ flex: 1, overflow: "auto", padding: "16px 14px 8px", display: "flex", flexDirection: "column", gap: 14 }}>
              {messages.map((m, i) => (
                <div key={i} style={{ display: "flex", gap: 8, justifyContent: m.role !== "user" ? "flex-start" : "flex-end" }}>
                  {m.role !== "user" && (
                    <div className="haven-avatar" style={{ width: 30, height: 30, marginTop: 3, flexShrink: 0 }}>
                      <CCIcon name="heart" size={13} color="white" />
                    </div>
                  )}
                  <div className={`haven-msg ${m.role !== "user" ? "haven-msg-ai" : "haven-msg-user"}`} style={{ color: m.role !== "user" ? "var(--cc-text)" : "white" }}>
                    {m.content || (m.streaming ? <span style={{ display: "flex", gap: 5, padding: "2px 0" }}><div className="typing-dot" /><div className="typing-dot" /><div className="typing-dot" /></span> : "")}
                  </div>
                </div>
              ))}
              <div ref={messagesEnd} />
            </div>
            {/* Quick replies */}
            <div style={{ padding: "6px 14px", overflowX: "auto", display: "flex", gap: 8, whiteSpace: "nowrap" }}>
              {["How are you today?", "I feel lonely", "Help me remember something", "What should I do today?", "Call my family"].map(q => (
                <button key={q} className="quick-reply" onClick={() => { setInput(q); inputRef.current?.focus(); }}>{q}</button>
              ))}
            </div>
            {/* Input */}
            <div style={{ padding: "10px 14px 14px", borderTop: "1px solid var(--cc-border)", display: "flex", gap: 8, alignItems: "flex-end", background: "white" }}>
              <button onClick={() => setShowVoice(v => !v)} style={{ width: 42, height: 42, borderRadius: "50%", background: showVoice ? "var(--cc-indigo)" : "#f5f3ff", border: "none", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", flexShrink: 0, transition: "all .2s", ...(showVoice ? { animation: "pulse-ring 2s infinite" } : {}) }}>
                <CCIcon name="mic" size={18} color={showVoice ? "white" : "var(--cc-indigo)"} />
              </button>
              <textarea ref={inputRef} value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && !e.shiftKey && (e.preventDefault(), sendMessage())} placeholder="Talk to H.A.V.E.N…" rows={1} style={{ flex: 1, background: "#f5f3ff", border: "1.5px solid var(--cc-border)", borderRadius: 18, padding: "11px 14px", color: "var(--cc-text)", fontSize: 15, resize: "none", lineHeight: 1.5, fontFamily: "var(--cc-font)", maxHeight: 90, outline: "none" }} />
              <button onClick={sendMessage} disabled={loading} style={{ width: 42, height: 42, borderRadius: "50%", background: loading ? "#e5e7eb" : "var(--cc-indigo)", border: "none", display: "flex", alignItems: "center", justifyContent: "center", cursor: loading ? "not-allowed" : "pointer", flexShrink: 0, transition: "all .2s" }}>
                {loading ? <div style={{ width: 16, height: 16, border: "2px solid white", borderTopColor: "transparent", borderRadius: "50%", animation: "spin .8s linear infinite" }} /> : <CCIcon name="send" size={16} color="white" />}
              </button>
            </div>
          </div>
        )}

        {/* DASHBOARD */}
        {activeTab === "dashboard" && (
          <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 14, animation: "fadeUp .4s ease" }}>
            <div style={{ background: "linear-gradient(135deg, var(--cc-indigo), var(--cc-violet))", borderRadius: 18, padding: "20px 20px", color: "white" }}>
              <div style={{ fontSize: 13, opacity: 0.8, marginBottom: 4 }}>Good morning, {profile.name} ☀️</div>
              <div style={{ fontSize: 20, fontWeight: 700, fontFamily: "var(--cc-serif)" }}>How are you today?</div>
              <div style={{ display: "flex", gap: 16, marginTop: 14 }}>

                  <div style={{ fontSize: 16, fontWeight: 700 }}>{avgMood}/10</div>

                  <div style={{ fontSize: 16, fontWeight: 700 }}>{Math.min(moodLog.length, 7)}</div>
                </div>
                <div style={{ background: lonelyDays > 2 ? "rgba(225,29,72,.3)" : "rgba(255,255,255,.15)", borderRadius: 12, padding: "10px 14px", flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 22 }}>🤝</div>
                  <div style={{ fontSize: 11, opacity: .8, marginTop: 2 }}>Lonely days</div>
                  <div style={{ fontSize: 16, fontWeight: 700 }}>{lonelyDays}/7</div>

      {/* Mood Modal */}

        <div style={{ position: "fixed", inset: 0, background: "rgba(30,27,75,.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20 }} onClick={e => e.target === e.currentTarget && setShowMoodModal(false)}>

            {[["Mood", "score", "var(--cc-indigo)"],["Energy", "energy", "var(--cc-sage)"]].map(([l,k,c]) => (

      {/* Bottom tabs */}

  );

const CCCaregiverPortal = ({ onNavigate }) => {
  const profile = ccStore.get("profile", DEFAULT_PROFILE);

  const [notes, setNotes] = useState(() => ccStore.get("care_notes", []));
  const [newNote, setNewNote] = useState("");
  const [reminders, setReminders] = useState(() => ccStore.get("reminders", REMINDER_TEMPLATES));
  const [showAddReminder, setShowAddReminder] = useState(false);
  const [newReminder, setNewReminder] = useState({ title: "", time: "09:00", repeat: "daily", icon: "🔔", category: "other" });

  const addNote = () => {
    if (!newNote.trim()) return;
    const updated = [{ id: Date.now(), text: newNote, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }) }, ...notes];
    setNotes(updated);
    ccStore.set("care_notes", updated);
    setNewNote("");
  };

  const addReminder = () => {
    const updated = [...reminders, { ...newReminder, id: Date.now() }];
    setReminders(updated);
    ccStore.set("reminders", updated);
    setShowAddReminder(false);
    setNewReminder({ title: "", time: "09:00", repeat: "daily", icon: "🔔", category: "other" });
  };

  const removeReminder = id => { const updated = reminders.filter(r => r.id !== id); setReminders(updated); ccStore.set("reminders", updated); };

  const lonelyDays = moodLog.slice(0, 7).filter(m => m.lonely).length;
  const avgMood = moodLog.slice(0, 7).length ? (moodLog.slice(0, 7).reduce((s, m) => s + m.score, 0) / Math.min(moodLog.length, 7)).toFixed(1) : "—";

  return (
    <div style={{ minHeight: "100vh", background: "var(--cc-cream)", color: "var(--cc-text)" }}>

          <div style={{ gridColumn: "1/-1", background: "rgba(225,29,72,.06)", border: "1px solid rgba(225,29,72,.25)", borderRadius: 14, padding: "16px 20px", display: "flex", gap: 14, alignItems: "start" }}>

            <div>

          <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 260, overflow: "auto" }}>

              <div key={n.id} style={{ background: "#f9f8ff", border: "1px solid var(--cc-border)", borderRadius: 10, padding: "12px 14px" }}>
                <div style={{ fontSize: 13, color: "var(--cc-text)", lineHeight: 1.6 }}>{n.text}</div>

        {/* Progress */}
        <div className="cc-card" style={{ padding: 22, background: "white", gridColumn: "1/-1" }}>
          <div style={{ fontFamily: "var(--cc-serif)", fontSize: 18, color: "var(--cc-text)", marginBottom: 16 }}>Progress Overview</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12 }}>

              </div>

          </div>
        </div>
      </div>
    </div>
  );
};

// UNIFIED APP ROOT — Dual Platform Router
// Platform A: GuardiansCall  (GC) — Airport AI Accessibility
// Platform B: SentinelHaven (CC) — H.A.V.E.N AI · Digital Support Ecosystem
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  // ── Read initial platform/view from URL hash ──
  // Supports: #gc, #cc, #gc/dictionary, #cc/cc-companion, etc.
  // Also supports ?platform=cc for standalone SentinelHaven deployment
  const getInitialState = () => {
    const params = new URLSearchParams(window.location.search);
    const hash   = window.location.hash.replace('#', '');
    const urlPlatform = params.get('platform') || (hash.startsWith('cc') ? 'cc' : hash.startsWith('gc') ? 'gc' : null);
    const urlView     = params.get('view') || hash || null;
    return { platform: urlPlatform || 'gc', view: urlView };
  };
  const init = getInitialState();

  const [platform, setPlatform] = useState(init.platform);
  const [gcView,  setGCView]    = useState(init.platform === 'gc' && init.view ? init.view : "landing");
  const [ccView,  setCCView]    = useState(init.platform === 'cc' && init.view ? init.view : "cc-landing");
  const [passengerProfile, setPassengerProfile] = useState(null);
  const [staffUser, setStaffUser] = useState(null);

  // ── Sync URL hash on navigation ──
  useEffect(() => {
    const hash = platform === 'gc' ? gcView : ccView;
    window.history.replaceState(null, '', `#${hash}`);
  }, [platform, gcView, ccView]);

  // ── Navigate within platform — opens in new tab for cross-platform links ──
  const gcNavigate = (v) => {
    // If navigating to SentinelHaven from GC: open in new tab
    if (v === 'sentinel' || v === 'cc-landing') {
      window.open(window.location.pathname + '#cc-landing', '_blank', 'noopener');
      return;
    }
    setGCView(v);
  };

  const ccNavigate = (v) => {
    // If navigating to GuardiansCall from CC: open in new tab
    if (v === 'gc-landing' || v === 'guardianscall') {
      window.open(window.location.pathname + '#landing', '_blank', 'noopener');
      return;
    }
    setCCView(v);
  };

  const completeOnboarding = (profile) => {
    setPassengerProfile(profile);
    setGCView("passenger");
  };
  const staffLogin = (user) => {
    setStaffUser(user);
    setGCView("staff-dashboard");
  };

  // ── Platform switch: opens other platform in new tab ──
  const switchPlatform = (p) => {
    if (p === platform) return;
    // Open the other platform in a new dedicated tab
    if (p === "cc") {
      window.open(window.location.pathname + '#cc-landing', '_blank', 'noopener');
    } else {
      window.open(window.location.pathname + '#landing', '_blank', 'noopener');
    }
  };

  // ── On load: if hash is cc* activate CC ──
  useEffect(() => {
    const hash = window.location.hash.replace('#','');
    if (hash.startsWith('cc')) {
      setPlatform('cc');
      if (hash) setCCView(hash);
    } else if (hash && !hash.startsWith('cc')) {
      setPlatform('gc');
      setGCView(hash || 'landing');
    }
  }, []);

  return (
    <>
      <SharedStyles />

      {/* Global Teams Live Support — both platforms */}
      <LiveSupport />

      {/* Platform Switcher pill */}
      <div className="platform-switcher" role="navigation" aria-label="Switch platform — opens in new tab">
        <button
          className={`ps-btn ${platform === "gc" ? "gc-active" : ""}`}
          onClick={() => switchPlatform("gc")}
          aria-pressed={platform === "gc"}
        >
          🛡 GuardiansCall ↗
        </button>
        <button
          className={`ps-btn ${platform === "cc" ? "cc-active" : ""}`}
          onClick={() => switchPlatform("cc")}
          aria-pressed={platform === "cc"}
        >
          💜 SentinelHaven ↗
        </button>
      </div>

      {/* ══ GuardiansCall Platform ══ */}
      {platform === "gc" && (
        <>
          {gcView === "landing"         && <LandingPage onNavigate={gcNavigate} />}
          {gcView === "onboard"         && <OnboardingFlow onComplete={completeOnboarding} />}
          {gcView === "passenger"       && <PassengerApp profile={passengerProfile || { name: "Traveler", conditions: ["TBI"], triggers: ["Crowds"], commsPrefs: ["Short sentences"] }} onNavigate={gcNavigate} />}
          {gcView === "login-staff"     && <StaffLogin onLogin={staffLogin} onBack={() => gcNavigate("landing")} />}
          {gcView === "dictionary"      && <ADADictionary onBack={() => gcNavigate("landing")} />}
          {gcView === "staff-dashboard" && <StaffDashboard staffUser={staffUser} onLogout={() => gcNavigate("landing")} />}
        </>
      )}

      {/* ══ SentinelHaven Platform ══ */}
      {platform === "cc" && (
        <>
          {ccView === "cc-landing"    && <CCLanding    onNavigate={ccNavigate} />}
          {ccView === "cc-companion"  && <CCCompanionApp onNavigate={ccNavigate} />}
          {ccView === "cc-family"     && <CCFamilyPortal  onNavigate={ccNavigate} />}
          {ccView === "cc-caregiver"  && <CCCaregiverPortal onNavigate={ccNavigate} />}
        </>
      )}
    </>
  );
}

const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(React.createElement(App));
  </script>
  <script>
    window.addEventListener('load',function(){
      setTimeout(function(){
        var s=document.getElementById('gc-splash');
        if(s){s.classList.add('out');setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s);},700);}
      },800);
    });
    window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();window._gcI=e;});
    if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(function(){});
  </script>
</body>
</html>
